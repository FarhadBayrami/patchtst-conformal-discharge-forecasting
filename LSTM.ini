; ════════════════════════════════════════════════════════════════════════════
; Casalecchio di Reno — PatchTST configuration
; Station 425 — Progea / TOPKAPI integration
; ════════════════════════════════════════════════════════════════════════════
;
; All paths below are RELATIVE to the folder this file lives in, so the
; whole casalecchio_patchtst_conformal folder can be copied anywhere (a USB drive,
; a different PC, a shared network folder) and will work unchanged as
; long as the internal structure stays intact:
;
;   casalecchio_patchtst_conformal/
;     LSTM.ini                 <- this file
;     1_prepare_data.py
;     2_train.py
;     3_evaluate.py
;     4_conformal.py
;     5_realtime_infer.py
;     data/raw/425.sbs.ts      <- put your TOPKAPI export here
;     data/processed/          <- created automatically by 1_prepare_data.py
;     models/                  <- created automatically by 2_train.py
;     outputs/                 <- created automatically by 3/4/5
;
; Run order: 1 -> 2 -> 3 -> 4 -> 5  (see README.md for full instructions)

[lstm]
; legacy section kept for compatibility with the original Progea LSTM
; pipeline this project was adapted from — not used by any script here.
patience=10
dropout=0.2
n_forecast=1
use_weights=True
unita=64
val_perc=0.2
hist_window=24
input_list=Prec,Temp
target_code=QM
time_data_path=data/raw/425.sbs.ts
start_date=2013-03-16 00:00
end_date=2023-10-19 00:00
model_dir=models
dl_code=Unit64_valp0.2_Set1_Time0_24
start_date_for=2013-03-16 00:00
end_date_for=2026-01-01 00:00

[patchtst]
; ── paths (relative to this file) ──────────────────────────────────────────
; Forward slashes work on both Windows and Linux/Mac — Windows accepts
; either separator, so this keeps the package portable.
raw_ts      = data/raw/425.sbs.ts
data_dir    = data/processed
model_dir   = models
out_dir     = outputs

; ── data ──────────────────────────────────────────────────────────────────
target_code = QM
; Fix A: training window starts 2014-01-01. The val/test split itself is
; defined inside 1_prepare_data.py (train <=2022, val=2023, test=2024) —
; see that file's docstring for why this split was chosen.
start_date  = 2014-01-01

; ── window ──────────────────────────────────────────────────────────────────
; hourly timestep. seq_len=60 -> 2.5 days lookback. lags use [1,2,3,7,14,21]
; hours, defined in 1_prepare_data.py and mirrored in 5_realtime_infer.py.
seq_len     = 60
patch_len   = 10
stride      = 5

; ── architecture ──────────────────────────────────────────────────────────
d_model     = 128
n_heads     = 4
n_layers    = 4
d_ff        = 512
dropout     = 0.10

; ── training ────────────────────────────────────────────────────────────────
; Tuned values (v5) — see 2_train.py docstring for the full rationale of
; each change versus the original v4 defaults.
batch_size  = 64
epochs      = 400
lr          = 3e-4
patience    = 80
huber_delta = 5.0
loss_w1     = 0.3
loss_w2     = 1.0

; ── evaluation / inference blend ────────────────────────────────────────────
; sigmoid blend between head1 (log-space) and head2 (magnitude) outputs,
; centred at blend_threshold m³/s with this steepness (blend_scale).
blend_threshold = 15.0
blend_scale     = 10.0
